<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} - {% endif %}{{ site.title }}</title>
    <meta name="description" content="{% if page.excerpt %}{{ page.excerpt | strip_html | strip_newlines | truncate: 160 }}{% else %}{{ site.description }}{% endif %}">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Courier New', monospace;
        }
    </style>
</head>
<body class="min-h-screen bg-gray-50">
    <!-- Navigation -->
    <nav class="py-4 border-b border-gray-200">
        <div class="max-w-4xl mx-auto px-4">
            <div class="flex justify-between items-center">
                <!-- Logo/Home Link -->
                <a href="{{ '/' | relative_url }}" class="text-xl font-bold text-gray-900 hover:text-gray-700 transition-colors duration-200">
                    {{ site.title }}
                </a>
                
                <!-- Navigation Links -->
                <div class="flex space-x-6">
                    <a href="{{ '/about' | relative_url }}" class="text-gray-700 hover:text-blue-600 transition-colors duration-200 font-medium">
                        About
                    </a>
                    <a href="https://resume.bryanmikaelian.com" target="_blank" rel="noopener noreferrer" class="text-gray-700 hover:text-blue-600 transition-colors duration-200 font-medium inline-flex items-center">
                        Resume
                        <svg class="ml-1 w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path>
                        </svg>
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="py-12">
        <article class="max-w-4xl mx-auto px-4">
            <div class="bg-white shadow-lg rounded-lg p-8 md:p-12  [&>p]:my-[15px] [&>p:first-child]:mt-0 [&>p:last-child]:mb-0">
                {{ content }}
            </div>
        </article>
    </main>
</body>
</html>
