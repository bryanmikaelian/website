---
layout: default
---
        <!-- Post Header -->
        <header class="text-center mb-8">
            <h1 class="text-3xl md:text-4xl font-bold text-gray-900 mb-4">{{ page.title }}</h1>
            {% if page.date %}
            <time datetime="{{ page.date | date_to_xmlschema }}" class="text-gray-600 text-sm">
                {{ page.date | date: "%B %d, %Y" }}
            </time>
            {% endif %}
        </header>

        <!-- Post Content -->
        <div class="prose prose-lg max-w-none text-gray-700 leading-relaxed [&>p]:my-[15px] [&>p:first-child]:mt-0 [&>p:last-child]:mb-0">
                {{ content }}
        </div>
