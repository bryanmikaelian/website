<article class="max-w-4xl mx-auto px-4">
    <div class="bg-white shadow-lg rounded-lg p-8 md:p-12">
        
        <!-- Post Header -->
        <header class="text-center mb-8">
            <h1 class="text-3xl md:text-4xl font-bold text-gray-900 mb-4">{{ page.title }}</h1>
            {% if page.date %}
            <time datetime="{{ page.date | date_to_xmlschema }}" class="text-gray-600 text-sm">
                {{ page.date | date: "%B %d, %Y" }}
            </time>
            {% endif %}
            {% if page.excerpt %}
            <p class="text-lg text-gray-600 mt-4">{{ page.excerpt }}</p>
            {% endif %}
        </header>

        <!-- Post Content -->
        <div class="prose prose-lg max-w-none text-gray-700 leading-relaxed">
            {{ content }}
        </div>
    </div>
</article>
